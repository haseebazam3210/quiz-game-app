<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Quiz Game - متقدم کوئز گیم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Home Screen -->
    <div id="homeScreen" class="screen active">
        <div class="home-content">
            <div class="logo">🎮 ADVANCED QUIZ GAME 🎮</div>
            <h1>متقدم کوئز گیم</h1>
            <p>سیکھیں، کھیلیں، جیتیں!</p>
            
            <div class="button-group">
                <button onclick="goToCategories()" class="btn btn-primary">
                    <i class="fas fa-play"></i> کھیل شروع کریں
                </button>
                <button onclick="showLeaderboard()" class="btn btn-info">
                    <i class="fas fa-trophy"></i> لیڈربورڈ
                </button>
                <button onclick="showSettings()" class="btn btn-settings">
                    <i class="fas fa-cog"></i> سیٹنگز
                </button>
            </div>

            <div class="stats-box">
                <div class="stat">
                    <span class="stat-label">کل کھیل:</span>
                    <span class="stat-value" id="totalGames">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">بہترین اسکور:</span>
                    <span class="stat-value" id="bestScore">0%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Selection Screen -->
    <div id="categoryScreen" class="screen">
        <div class="header">
            <button onclick="backToHome()" class="back-btn"><i class="fas fa-arrow-right"></i></button>
            <h2>کیٹیگری منتخب کریں</h2>
        </div>
        <div class="category-grid" id="categoryGrid"></div>
    </div>

    <!-- Difficulty Selection Screen -->
    <div id="difficultyScreen" class="screen">
        <div class="header">
            <button onclick="backToCategory()" class="back-btn"><i class="fas fa-arrow-right"></i></button>
            <h2>مشکل سطح منتخب کریں</h2>
        </div>
        <div class="difficulty-container">
            <div onclick="startQuiz('easy')" class="difficulty-card easy">
                <div class="difficulty-icon">🟢</div>
                <h3>آسان</h3>
                <p>شروعات کریں</p>
            </div>
            <div onclick="startQuiz('medium')" class="difficulty-card medium">
                <div class="difficulty-icon">🟡</div>
                <h3>درمیانی</h3>
                <p>چیلنج</p>
            </div>
            <div onclick="startQuiz('hard')" class="difficulty-card hard">
                <div class="difficulty-icon">🔴</div>
                <h3>مشکل</h3>
                <p>ماہرانہ</p>
            </div>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quizScreen" class="screen">
        <div class="quiz-header">
            <div class="quiz-info">
                <span class="category-badge" id="categoryBadge"></span>
                <span class="difficulty-badge" id="difficultyBadge"></span>
            </div>
            <div class="timer">
                <i class="fas fa-hourglass-end"></i>
                <span id="timerDisplay">30</span>s
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="quiz-container">
            <div class="question-section">
                <h2 id="questionText"></h2>
                <span class="question-number" id="questionNumber"></span>
            </div>

            <div id="optionsSection" class="options-section"></div>

            <div class="quiz-actions">
                <button onclick="skipQuestion()" class="btn-secondary">
                    <i class="fas fa-forward"></i> اگے جائیں
                </button>
                <button id="nextBtn" onclick="nextQuestion()" disabled class="btn-primary">
                    اگلا سوال <i class="fas fa-arrow-left"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Results Screen -->
    <div id="resultsScreen" class="screen">
        <div class="results-container">
            <div class="results-header">
                <div class="result-icon" id="resultIcon"></div>
                <h2 id="resultMessage"></h2>
            </div>

            <div class="score-card">
                <div class="score-circle">
                    <div class="score-percentage" id="scorePercentage"></div>
                    <div class="score-label">فیصد</div>
                </div>

                <div class="score-details">
                    <div class="detail-item">
                        <span class="detail-label">صحیح جوابات:</span>
                        <span class="detail-value" id="correctAnswers"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">غلط جوابات:</span>
                        <span class="detail-value" id="wrongAnswers"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">اسکپ کیے:</span>
                        <span class="detail-value" id="skippedAnswers"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">وقت لگا:</span>
                        <span class="detail-value" id="timeTaken"></span>
                    </div>
                </div>
            </div>

            <div class="achievements" id="achievementsSection"></div>

            <div class="button-group">
                <button onclick="backToHome()" class="btn btn-primary">
                    <i class="fas fa-home"></i> ہوم پر جائیں
                </button>
                <button onclick="goToCategories()" class="btn btn-secondary">
                    <i class="fas fa-redo"></i> دوبارہ کھیلیں
                </button>
            </div>
        </div>
    </div>

    <!-- Leaderboard Screen -->
    <div id="leaderboardScreen" class="screen">
        <div class="header">
            <button onclick="backToHome()" class="back-btn"><i class="fas fa-arrow-right"></i></button>
            <h2>🏆 لیڈربورڈ</h2>
        </div>
        <div class="leaderboard-container">
            <div id="leaderboardContent" class="leaderboard-content"></div>
        </div>
    </div>

    <!-- Settings Screen -->
    <div id="settingsScreen" class="screen">
        <div class="header">
            <button onclick="backToHome()" class="back-btn"><i class="fas fa-arrow-right"></i></button>
            <h2>⚙️ سیٹنگز</h2>
        </div>
        <div class="settings-container">
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="soundToggle" checked>
                    <span>آواز</span>
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="darkModeToggle">
                    <span>رات کا موڈ</span>
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <span>سوالات کی تعداد:</span>
                    <select id="questionCount">
                        <option value="5">5 سوالات</option>
                        <option value="10" selected>10 سوالات</option>
                        <option value="15">15 سوالات</option>
                        <option value="20">20 سوالات</option>
                    </select>
                </label>
            </div>
            <button onclick="clearData()" class="btn btn-danger">
                <i class="fas fa-trash"></i> ڈیٹا صاف کریں
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
